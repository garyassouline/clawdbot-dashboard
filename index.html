<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClawdBot Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #e5484d;
      --accent2: #3b82f6;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --yellow: #eab308;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      padding: 24px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .updated { font-size: 0.75rem; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .card .value { font-size: 1.8rem; font-weight: 700; }
    .card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    .card.accent { border-color: var(--accent); }
    .card.accent .value { color: var(--accent); }
    .card.blue { border-color: var(--accent2); }
    .card.blue .value { color: var(--accent2); }
    .card.green { border-color: var(--green); }
    .card.green .value { color: var(--green); }
    .wide { grid-column: 1 / -1; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .chart-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 220px; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: var(--text); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge.ok { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.warn { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge.off { background: rgba(100,116,139,0.15); color: var(--muted); }
    .model-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(59,130,246,0.15);
      color: var(--accent2);
    }
    .empty { color: var(--muted); font-size: 0.85rem; padding: 16px 0; text-align: center; }
    @media (max-width: 600px) { body { padding: 16px; } .card .value { font-size: 1.4rem; } }
  </style>
</head>
<body>
  <header>
    <h1>🦞 <span>ClawdBot</span> Dashboard</h1>
    <span class="updated" id="updated-at">Chargement…</span>
  </header>

  <!-- KPI Cards -->
  <div class="grid" id="kpi-grid">
    <div class="card accent">
      <div class="label">Tokens aujourd'hui</div>
      <div class="value" id="tokens-today">—</div>
      <div class="sub" id="tokens-today-sub">—</div>
    </div>
    <div class="card blue">
      <div class="label">Sessions actives</div>
      <div class="value" id="sessions-count">—</div>
      <div class="sub" id="model-current">—</div>
    </div>
    <div class="card green">
      <div class="label">Automatisations</div>
      <div class="value" id="cron-count">—</div>
      <div class="sub" id="cron-sub">—</div>
    </div>
    <div class="card">
      <div class="label">Coût estimé (session)</div>
      <div class="value" id="cost-session">—</div>
      <div class="sub">input + output tokens</div>
    </div>
  </div>

  <!-- Token chart -->
  <div class="chart-card">
    <h2>📊 Consommation tokens (7 derniers jours)</h2>
    <div class="chart-wrap">
      <canvas id="tokenChart"></canvas>
    </div>
  </div>

  <!-- Deux colonnes -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;" class="two-col">
    <!-- Sessions -->
    <div class="chart-card" style="margin-bottom:0">
      <h2>🧵 Sessions</h2>
      <table>
        <thead><tr><th>Session</th><th>Modèle</th><th>Tokens</th><th>Statut</th></tr></thead>
        <tbody id="sessions-table"><tr><td colspan="4" class="empty">Chargement…</td></tr></tbody>
      </table>
    </div>
    <!-- Crons -->
    <div class="chart-card" style="margin-bottom:0">
      <h2>⚡ Automatisations</h2>
      <table>
        <thead><tr><th>Nom</th><th>Schedule</th><th>Statut</th></tr></thead>
        <tbody id="cron-table"><tr><td colspan="3" class="empty">Chargement…</td></tr></tbody>
      </table>
    </div>
  </div>

  <script>
    async function load() {
      try {
        const r = await fetch('./data.json?t=' + Date.now());
        const d = await r.json();
        render(d);
      } catch(e) {
        document.getElementById('updated-at').textContent = 'Erreur de chargement';
      }
    }

    function fmt(n) {
      if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n/1000).toFixed(1) + 'k';
      return n;
    }

    function render(d) {
      document.getElementById('updated-at').textContent = 'Mis à jour : ' + new Date(d.updatedAt).toLocaleString('fr-FR');

      // KPIs
      const s = d.session || {};
      document.getElementById('tokens-today').textContent = fmt((s.tokensIn||0) + (s.tokensOut||0));
      document.getElementById('tokens-today-sub').textContent = `${fmt(s.tokensIn||0)} in · ${fmt(s.tokensOut||0)} out`;
      document.getElementById('sessions-count').textContent = d.sessions ? d.sessions.length : '1';
      document.getElementById('model-current').textContent = s.model || '—';
      document.getElementById('cron-count').textContent = d.crons ? d.crons.length : '0';
      document.getElementById('cron-sub').textContent = d.crons && d.crons.length ? d.crons.filter(c=>c.enabled).length + ' actives' : 'Aucune configurée';

      // Cost estimate (rough)
      const inputCost = ((s.tokensIn||0) / 1000000) * 0.15;
      const outputCost = ((s.tokensOut||0) / 1000000) * 0.60;
      document.getElementById('cost-session').textContent = '$' + (inputCost + outputCost).toFixed(4);

      // Sessions table
      const st = document.getElementById('sessions-table');
      if (d.sessions && d.sessions.length) {
        st.innerHTML = d.sessions.map(s => `
          <tr>
            <td>${s.key || '—'}</td>
            <td><span class="model-badge">${s.model || '—'}</span></td>
            <td>${fmt((s.tokensIn||0)+(s.tokensOut||0))}</td>
            <td><span class="badge ok">active</span></td>
          </tr>`).join('');
      } else {
        st.innerHTML = '<tr><td colspan="4" class="empty">Aucune session</td></tr>';
      }

      // Cron table
      const ct = document.getElementById('cron-table');
      if (d.crons && d.crons.length) {
        ct.innerHTML = d.crons.map(c => `
          <tr>
            <td>${c.name || c.id || '—'}</td>
            <td style="font-size:0.75rem;color:var(--muted)">${c.schedule || '—'}</td>
            <td><span class="badge ${c.enabled ? 'ok' : 'off'}">${c.enabled ? 'active' : 'off'}</span></td>
          </tr>`).join('');
      } else {
        ct.innerHTML = '<tr><td colspan="3" class="empty">Aucune automatisation</td></tr>';
      }

      // Token chart
      const history = d.tokenHistory || [];
      const labels = history.map(h => h.date);
      const values = history.map(h => h.total);
      const ctx = document.getElementById('tokenChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Tokens',
            data: values,
            backgroundColor: 'rgba(229,72,77,0.5)',
            borderColor: '#e5484d',
            borderWidth: 1,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#2a2d3a' }, ticks: { color: '#64748b' } },
            y: { grid: { color: '#2a2d3a' }, ticks: { color: '#64748b' } }
          }
        }
      });
    }

    load();
    setInterval(load, 5 * 60 * 1000); // refresh toutes les 5 min
  </script>
</body>
</html>
